<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esra — Yüksek Lisans Mülakat Rehberi</title>
<style>
:root {
  --bg: #0A1628;
  --surface: #112240;
  --surface2: #1A3356;
  --gold: #C9A84C;
  --gold-dim: #8a6e2e;
  --blue: #4A90D9;
  --blue-dim: #2a5a99;
  --text: #E8EDF4;
  --text-dim: #8a9ab5;
  --text-muted: #5a6a85;
  --border: #1e3a5f;
  --green: #3dd68c;
  --red: #e05c5c;
  --radius: 10px;
  --radius-sm: 6px;
  --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.app-header {
  background: linear-gradient(135deg, #0A1628 0%, #112240 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}
.app-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dim));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #0A1628;
  flex-shrink: 0;
}
.app-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
.app-subtitle { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
.header-badge {
  margin-left: auto;
  background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 0.05em;
}

/* ── TAB NAV ── */
.tab-nav {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0;
  padding: 14px 20px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dim);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}
.tab-icon { margin-right: 6px; }

/* ── MAIN LAYOUT ── */
.app-body { display: flex; height: calc(100vh - 115px); overflow: hidden; }
.tab-panel { display: none; width: 100%; height: 100%; overflow: hidden; }
.tab-panel.active { display: flex; }

/* ── PANEL 1: PROGRAMLAR ── */
.prog-sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 8px;
}
.prog-btn {
  width: 100%;
  text-align: left;
  padding: 12px 14px;
  border: none;
  background: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.18s;
  margin-bottom: 4px;
  border-left: 3px solid transparent;
}
.prog-btn:hover { background: var(--surface2); }
.prog-btn.active {
  background: rgba(201,168,76,0.08);
  border-left-color: var(--gold);
}
.prog-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.prog-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
.prog-btn.active .prog-name { color: var(--gold); }
.prog-btn.active .prog-label { color: var(--gold-dim); }

.prog-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
}

.strategy-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.strategy-card h3 {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.strategy-card p { font-size: 14px; color: var(--text-dim); line-height: 1.65; }

.koz-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.koz-tag {
  background: rgba(74,144,217,0.1);
  border: 1px solid rgba(74,144,217,0.25);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--blue);
  font-weight: 600;
}

.cumle-box {
  background: rgba(201,168,76,0.06);
  border: 1px solid rgba(201,168,76,0.2);
  border-left: 3px solid var(--gold);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  margin-top: 16px;
}
.cumle-box .cumle-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.cumle-box p {
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.7;
  font-style: italic;
}

.section-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.section-sub {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 20px;
}

/* Hoca kartları */
.hoca-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.hoca-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.hoca-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--blue), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
.hoca-card:hover { border-color: var(--blue-dim); transform: translateY(-1px); }
.hoca-card:hover::before { opacity: 1; }

.hoca-unvan {
  font-size: 10px;
  font-weight: 700;
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.hoca-ad {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}
.hoca-alan {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 10px;
}
.hoca-sinerji {
  font-size: 11.5px;
  color: var(--green);
  line-height: 1.5;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.hoca-links {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}
.hoca-link {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-decoration: none;
  background: var(--surface2);
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  transition: all 0.15s;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.hoca-link:hover { color: var(--gold); border-color: var(--gold-dim); }

/* ── PANEL 2: MÜLAKAT ── */
.sim-layout {
  display: flex;
  width: 100%;
  height: 100%;
}
.sim-left {
  width: 260px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 10px;
  overflow-y: auto;
}
.sim-left h3 {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.sim-prog-btn {
  width: 100%;
  text-align: left;
  padding: 10px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
}
.sim-prog-btn:hover { color: var(--text); border-color: var(--blue-dim); }
.sim-prog-btn.active {
  background: rgba(74,144,217,0.12);
  border-color: var(--blue);
  color: var(--blue);
}

.sim-type-group { margin-top: 8px; }
.sim-type-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 8px 12px;
  background: none;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
}
.sim-type-btn:hover { background: var(--surface2); color: var(--text); }
.sim-type-btn.active {
  background: rgba(201,168,76,0.08);
  border-color: rgba(201,168,76,0.25);
  color: var(--gold);
}

.sim-main {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.jury-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 20px;
}
.jury-dots {
  display: flex;
  gap: 6px;
}
.jury-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  transition: all 0.3s;
}
.jury-dot.active {
  background: var(--red);
  border-color: var(--red);
  box-shadow: 0 0 6px rgba(224,92,92,0.5);
}
.jury-label { font-size: 12px; color: var(--text-dim); }
.jury-prog { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--gold); }

.soru-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.soru-card:hover { border-color: var(--blue-dim); }
.soru-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 16px;
  cursor: pointer;
  user-select: none;
}
.soru-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  flex-shrink: 0;
  margin-top: 1px;
}
.soru-meta { flex: 1; }
.soru-tip {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.tip-genel { color: var(--blue); }
.tip-teknik { color: var(--red); }
.tip-stres { color: #ff9f43; }
.tip-motivasyon { color: var(--green); }
.soru-text { font-size: 14px; color: var(--text); line-height: 1.5; font-weight: 500; }
.soru-toggle {
  font-size: 18px;
  color: var(--text-muted);
  flex-shrink: 0;
  transition: transform 0.2s;
  margin-top: 2px;
}
.soru-card.open .soru-toggle { transform: rotate(180deg); }
.soru-card.open { border-color: var(--blue-dim); }

.soru-body {
  display: none;
  padding: 0 16px 16px 54px;
}
.soru-card.open .soru-body { display: block; }
.cevap-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.cevap-label::before {
  content: '';
  width: 12px; height: 2px;
  background: var(--gold);
}
.cevap-text {
  font-size: 13.5px;
  color: var(--text-dim);
  line-height: 1.7;
  border-left: 2px solid var(--gold-dim);
  padding-left: 14px;
  font-style: italic;
}
.cevap-ipucu {
  margin-top: 10px;
  background: rgba(61,214,140,0.07);
  border: 1px solid rgba(61,214,140,0.2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 12px;
  color: var(--green);
  line-height: 1.5;
}
.cevap-ipucu strong { font-weight: 700; }

/* ── PANEL 3: BİLİMSEL ── */
.bilim-layout {
  display: flex;
  width: 100%;
  height: 100%;
}
.bilim-sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 12px 8px;
  overflow-y: auto;
}
.konu-btn {
  width: 100%;
  text-align: left;
  padding: 10px 14px;
  background: none;
  border: none;
  border-left: 3px solid transparent;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.konu-btn:hover { background: var(--surface2); color: var(--text); }
.konu-btn.active {
  background: rgba(74,144,217,0.08);
  border-left-color: var(--blue);
  color: var(--blue);
}
.konu-icon { font-size: 14px; }

.bilim-main {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.soru-bilim {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
}
.soru-bilim:hover { border-color: var(--blue-dim); }
.soru-bilim.open { border-color: var(--blue); }
.soru-bilim-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
}
.diff-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.diff-easy { background: var(--green); }
.diff-med { background: #ff9f43; }
.diff-hard { background: var(--red); }
.soru-bilim-text { flex: 1; font-size: 13.5px; color: var(--text); font-weight: 500; line-height: 1.4; }
.soru-bilim-toggle { color: var(--text-muted); font-size: 16px; transition: transform 0.2s; }
.soru-bilim.open .soru-bilim-toggle { transform: rotate(180deg); }
.soru-bilim-body {
  display: none;
  padding: 0 16px 16px 36px;
}
.soru-bilim.open .soru-bilim-body { display: block; }
.cevap-iskelet {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.7;
  border-left: 2px solid var(--blue-dim);
  padding-left: 14px;
  margin-bottom: 10px;
}
.kavram-tag {
  display: inline-block;
  background: rgba(74,144,217,0.1);
  border: 1px solid rgba(74,144,217,0.2);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 11px;
  color: var(--blue);
  font-weight: 600;
  margin: 2px 2px 0 0;
}

/* scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* section divider */
.sec-divider {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 8px 6px 4px;
  margin-top: 8px;
}

/* progress bar */
.prog-bar-wrap { margin-bottom: 20px; }
.prog-bar-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
.prog-bar { height: 3px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.prog-bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--gold)); border-radius: 3px; transition: width 0.3s; }

/* empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60%;
  color: var(--text-muted);
  gap: 8px;
}
.empty-icon { font-size: 40px; opacity: 0.4; }
.empty-text { font-size: 14px; }

@media (max-width: 680px) {
  .prog-sidebar, .sim-left, .bilim-sidebar { width: 180px; }
  .hoca-grid { grid-template-columns: 1fr; }
  .prog-content, .sim-main, .bilim-main { padding: 14px; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-logo">E</div>
  <div>
    <div class="app-title">Mülakat Rehberi</div>
    <div class="app-subtitle">Yüksek Lisans Başvurusu · Esra Asma Kaya</div>
  </div>
  <div class="header-badge">5 Program</div>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="showTab('programlar')">
    <span class="tab-icon">🎯</span>Programlar & Hocalar
  </button>
  <button class="tab-btn" onclick="showTab('mulakat')">
    <span class="tab-icon">🎤</span>Mülakat Simülatörü
  </button>
  <button class="tab-btn" onclick="showTab('bilimsel')">
    <span class="tab-icon">🔬</span>Bilimsel Hazırlık
  </button>
</nav>

<div class="app-body">

<!-- ══════ PANEL 1: PROGRAMLAR ══════ -->
<div id="tab-programlar" class="tab-panel active">
  <div class="prog-sidebar">
    <div class="sec-divider">GSÜ</div>
    <button class="prog-btn active" onclick="showProg('gsu-isletme', this)">
      <div class="prog-label">GSÜ</div>
      <div class="prog-name">İşletme YL</div>
    </button>
    <button class="prog-btn" onclick="showProg('gsu-em', this)">
      <div class="prog-label">GSÜ</div>
      <div class="prog-name">Endüstri Müh. YL</div>
    </button>
    <div class="sec-divider">İTÜ</div>
    <button class="prog-btn" onclick="showProg('itu-isletme', this)">
      <div class="prog-label">İTÜ</div>
      <div class="prog-name">İşletme Müh. YL</div>
    </button>
    <button class="prog-btn" onclick="showProg('itu-em', this)">
      <div class="prog-label">İTÜ</div>
      <div class="prog-name">Endüstri Müh. YL</div>
    </button>
    <button class="prog-btn" onclick="showProg('itu-my', this)">
      <div class="prog-label">İTÜ</div>
      <div class="prog-name">Müh. Yönetimi YL</div>
    </button>
  </div>

  <div class="prog-content" id="prog-content">
    <!-- dynamically rendered -->
  </div>
</div>

<!-- ══════ PANEL 2: MÜLAKAT ══════ -->
<div id="tab-mulakat" class="tab-panel">
  <div class="sim-left">
    <h3>Program</h3>
    <button class="sim-prog-btn active" onclick="simSetProg('itu-isletme', this)">İTÜ İşletme Müh.</button>
    <button class="sim-prog-btn" onclick="simSetProg('itu-em', this)">İTÜ Endüstri Müh.</button>
    <button class="sim-prog-btn" onclick="simSetProg('itu-my', this)">İTÜ Müh. Yönetimi</button>
    <button class="sim-prog-btn" onclick="simSetProg('gsu-isletme', this)">GSÜ İşletme</button>
    <button class="sim-prog-btn" onclick="simSetProg('gsu-em', this)">GSÜ Endüstri Müh.</button>

    <div class="sec-divider" style="margin-top:12px">Soru Tipi</div>
    <div class="sim-type-group">
      <button class="sim-type-btn active" onclick="simSetTip('hepsi', this)">🔀 Tümü</button>
      <button class="sim-type-btn" onclick="simSetTip('motivasyon', this)">💚 Motivasyon</button>
      <button class="sim-type-btn" onclick="simSetTip('teknik', this)">🔴 Teknik</button>
      <button class="sim-type-btn" onclick="simSetTip('stres', this)">🟠 Stres</button>
      <button class="sim-type-btn" onclick="simSetTip('genel', this)">🔵 Genel</button>
    </div>
  </div>

  <div class="sim-main" id="sim-main">
    <!-- dynamically rendered -->
  </div>
</div>

<!-- ══════ PANEL 3: BİLİMSEL ══════ -->
<div id="tab-bilimsel" class="tab-panel">
  <div class="bilim-sidebar">
    <div class="sec-divider">Temel</div>
    <button class="konu-btn active" onclick="showKonu('istatistik', this)">
      <span class="konu-icon">📊</span>İstatistik & Analiz
    </button>
    <button class="konu-btn" onclick="showKonu('mcdm', this)">
      <span class="konu-icon">⚖️</span>MCDM Yöntemleri
    </button>
    <button class="konu-btn" onclick="showKonu('ml', this)">
      <span class="konu-icon">🤖</span>Makine Öğrenmesi
    </button>

    { tip: 'stres', soru: 'İşletme mühendisliği ile "saf" pazarlama arasında kendinizi nereye koyuyorsunuz? Ne sizi bir pazarlamacıdan farklı kılıyor?', cevap: 'Pazarlamacı "ne yapmalıyız" sorusunu sorar; işletme mühendisi "bu kararı nasıl optimize ederiz" sorusunu sorar. Fark somut: bir pazarlamacı sezgiyle segment seçer, ben K-means kümeleme ile segment oluşturur, sonra CLV modeliyle optimize ederim. Hipodrom\u2019da bu farkı pratikte yaşadım.', ipucu: '💡 Bu soruyu somut araç-yöntem örnekleriyle cevapla; teorik kalmayın.' },
    { tip: 'genel', soru: 'İTÜ İşletme Mühendisliği\u2019nin diğer programlardan farkı nedir sizin için?', cevap: 'İTÜ İşletme Mühendisliği, pazarlamayı bir "sistem tasarımı ve optimizasyon problemi" olarak ele alıyor — bu tam benim dünya görüşüm. Şebnem Burnaz\u2019ın analitik pazarlama araştırmaları ve Adnan Veysel Ertemel\u2019in dijital büyüme modelleri birebir ilgi alanımla örtüşüyor.', ipucu: '💡 Hoca adlarını ve araştırma konularını bilerek söylemek jüriyi doğrudan etkiler.' },
    { tip: 'genel', soru: 'Tez konunuz ne olur? Hangi problemi çözmek istiyorsunuz?', cevap: 'Dijital platformlarda makine öğrenmesi tabanlı dinamik müşteri kayıp (churn) modellemesi ve kişiselleştirilmiş müşteri tutundurma stratejilerinin ROI optimizasyonu. Hipodrom.com\u2019daki B2Metric deneyimim bu konuda zengin saha verisi sağlıyor.', ipucu: '💡 Tez konusunu somut, ölçülebilir ve hoca uzmanlıklarıyla örtüşür şekilde ifade et.' },
    { tip: 'genel', soru: 'Yüksek lisans döneminde hangi yayın tiplerini hedefliyorsunuz? Makale yazmayı düşünüyor musunuz?', cevap: 'Hedefim SSCI veya SCI-E indeksli bir dergide en az bir makale yayımlamak. Dijital pazarlama analitiği alanında Journal of Marketing Research, International Journal of Research in Marketing veya Computers in Human Behavior hedef dergilerim arasında. Danışmanımın rehberliğinde tez çalışmamı makaleye dönüştürmek istiyorum.', ipucu: '💡 Hedef dergi ismi söylemek ciddiyet gösterir. Önceden bir iki dergiyi araştır.' },
    { tip: 'motivasyon', soru: 'Sizi akademiye iten en somut deneyim neydi?', cevap: 'Hipodrom.com\u2019da B2Metric üzerinden churn tahmini yaparken fark ettim ki kullandığım modellerin akademik literatürde test edilmemiş boyutları var. "Bu neden böyle çalışıyor?" sorusuna saha verisinin ötesinde bir çerçeve lazım. O an akademiyi seçmem gerektiğini anladım.', ipucu: '💡 Bu cevap özgün ve kişisel. Onu kendi sözlerinle yeniden kur.' },
    { tip: 'stres', soru: 'Jürimizden birinin tam olarak çalışma alanınızla örtüşen bir makalesini okudunuz mu?', cevap: 'Evet. Elif Karaosmanoğlu\u2019nun kurumsal marka kimliği ile tüketici tutumu ilişkisini SEM ile incelediği çalışmasını okudum; tüketici beklenti-gerçeklik uyuşmazlığını dijital kanalda test etme fikrini oradan aldım. Adnan Veysel Ertemel\u2019in yapay zekâ destekli kişiselleştirilmiş pazarlama üzerine olan çalışması ise doğrudan Hipodrom deneyimimle örtüşüyor.', ipucu: '💡 Bu soruya hazırlıksız yakalanmak en büyük mülakat hatasıdır. Google Scholar\u2019dan en az 2 hoca makalesini gerçekten oku.' }
  ],
  'itu-em': [
    { tip: 'teknik', soru: 'Makine öğrenmesinde "aşırı öğrenme" (overfitting) nedir? Nasıl önlenir?', cevap: 'Overfitting: modelin eğitim verisini çok iyi öğrenip yeni verilerde başarısız olması. Önlemler: Cross-validation (k-fold), regularization (L1/L2), erken durdurma (early stopping), dropout (derin öğrenmede), eğitim setini büyütmek. Bias-variance tradeoff dengesinin bozulması sonucu ortaya çıkar.', ipucu: '💡 B2Metric\u2019te tahminsel modeller kurarken bu sorunla karşılaştığını söyleyebilirsin.' },
    { tip: 'teknik', soru: 'Churn analizi için hangi ML algoritmasını tercih ederdiniz ve neden?', cevap: 'Yorumlanabilirlik önemliyse Logistic Regression veya Decision Tree. Performans öncelikli ise XGBoost veya Random Forest — dengesiz sınıflar için SMOTE ile. Müşteri segmentlere göre farklı modeller de kurulabilir. En önemli adım: doğru feature engineering ve churn tanımı.', ipucu: '💡 Hipodrom.com\u2019da B2Metric\u2019in hangi algoritmayı kullandığını araştır, mülakatta bahset.' },
    { tip: 'teknik', soru: 'Bir veri setinde korelasyon bulmak tüketici davranışını açıklamak için yeterli midir?', cevap: 'Hayır. Korelasyon nedensellik anlamına gelmez. Nedenselliği kurmak için A/B testleri (deneysel tasarım), Instrumental Variable, Difference-in-Differences veya Regression Discontinuity gibi yöntemler gerekir. Mühendislikte aldığım Deney Tasarımı (DoE) altyapısı bu boşluğu doldurmama yardımcı olur.', ipucu: '💡 Bu soruyu bekliyorsan, cevabı ezberlemek yerine kendi sözlerinle anlat.' },
    { tip: 'teknik', soru: 'K-means kümeleme algoritması nasıl çalışır? Pazarlama segmentasyonunda kullanım kısıtları nelerdir?', cevap: 'K-means: k merkez noktası rastgele seçilir, her gözlem en yakın merkeze atanır, merkezler güncellenir, yakınsayana kadar tekrarlanır. Kısıtlar: k sayısını önceden belirtmek gerekir (Elbow method veya Silhouette ile seçilir), dairesel kümeler varsayar, kategorik değişkenlerde çalışmaz (K-modes kullanılmalı), büyük boyutlarda seyreltme (curse of dimensionality) riski taşır. Müşteri segmentasyonunda RFM skorları girdi olarak kullanılabilir.', ipucu: '💡 "Hipodrom\u2019da kullanıcı segmentasyonunu RFM + K-means ile kurgulayabileceğimi düşünüyorum" demek pratik bağ kurar.' },
    { tip: 'teknik', soru: 'Feature Engineering nedir? CRM verisinde hangi özellikleri türetirsiniz?', cevap: 'Feature engineering: ham veriden modelin öğrenmesine yardımcı olacak anlamlı değişkenler oluşturma. CRM verisinde: recency (son işlemden bu yana gün sayısı), frequency (belirli dönemdeki işlem sayısı), monetary (toplam harcama), ortalama oturum süresi, kampanya açma oranı, tercih edilen kanal, işlem saati örüntüleri. Lag özellikler (geçmiş dönem değerleri) ve rolling ortalamalar da güçlü tahmin özelliklerindendir.', ipucu: '💡 Bu soruyu B2Metric deneyiminle doğrudan bağla. "Bu özellikleri Hipodrom\u2019da bizzat oluşturdum" de.' },
    { tip: 'teknik', soru: 'Karar Destek Sistemi (DSS) nedir? CRM ile farkı nedir?', cevap: 'DSS: yapılandırılmamış veya yarı yapılandırılmış karar problemlerini modelleyerek karar vericiye analitik destek sunan bilgi sistemi bileşenlerinden oluşur (veritabanı, model tabanı, kullanıcı arayüzü). CRM ise müşteri ilişkilerinin yönetimi odaklı operasyonel bir sistemdir. DSS, CRM verisini girdi alarak "hangi segmente hangi kampanya" gibi stratejik kararları destekler. Birleşim: B2Metric gibi araçlar CRM verisini bir DSS katmanıyla işler.', ipucu: '💡 Başar Öztayşi\u2019nin karar destek sistemleri makalelerini Google Scholar\u2019dan oku.' },
    { tip: 'stres', soru: 'Sen bir mühendis değil misin? Pazarlama neden ilgilendiriyor seni?', cevap: 'Pazarlama artık yaratıcı süreçten çok bir veri bilimidir. Tüketici yolculuğu, bir optimizasyon problemidir; müşteri segmentasyonu, kümeleme algoritmasıdır; fiyatlandırma, bir dinamik programlama sorusudur. Ben mühendislik araçlarımı bu alanın çözülmemiş problemlerine uygulamak istiyorum.', ipucu: '💡 "Pazarlama" kelimesini hiç kullanmadan anlat. Bunun yerine "pazar verilerinin optimizasyonu" de.' },
    { tip: 'stres', soru: 'Endüstri mühendisliği yüksek lisansında ağırlıklı olarak yöneylem araştırması yapılır. Siz pazarlamaya dönmeyecek misiniz?', cevap: 'Tam tersine, dönmek istemiyorum çünkü zaten oradayım. Modern pazarlama analitiği, doğrusal programlama, stokastik modelleme ve optimizasyon yöntemleri olmadan çalışmıyor. Tez konumu "dijital platformlarda pazarlama bütçesi optimizasyonu" veya "müşteri segmentlerinin MCDM ile dinamik yönetimi" üzerine kurgularsam, hem yöneylem araştırması hem pazarlama çıktısı üretmiş olurum.', ipucu: '💡 "İkisi çatışmıyor, birbirini tamamlıyor" mesajını ver.' },
    { tip: 'motivasyon', soru: 'Neden endüstri mühendisliği yüksek lisansı? MBA yapmayı düşündünüz mü?', cevap: 'MBA pratik yönetim becerilerini pekiştirir; endüstri mühendisliği ise algoritmik derinlik ve akademik üretim sunar. Hedefim doktora ve akademisyenlik — bu yolda EM yüksek lisansının matematiksel altyapısı vazgeçilmez.', ipucu: '💡 "Akademisyen olmak istiyorum" mesajını güçlü ver.' },
    { tip: 'motivasyon', soru: 'Bu programda hangi hocayla çalışmak istiyorsunuz ve neden?', cevap: 'Başar Öztayşi ile çalışmak istiyorum. Bulanık mantık tabanlı tavsiye sistemleri ve e-ticaret analitiği üzerine uluslararası yayınları var; bu tam olarak Hipodrom\u2019daki B2Metric deneyimimle kesişiyor. Müşteri yaşam boyu değerini bulanık karar destek sistemiyle modellemek üzerine tez önerisi geliştirdim.', ipucu: '💡 Hoca seçimini gerekçeyle sun. "Makalelerini okudum" demek yeterli değil; "şu makalesindeki şu metodolojiyi tezimde kullanmak istiyorum" de.' },
    { tip: 'genel', soru: 'İTÜ\u2019de İTÜ Dijital Pazarlama Kulübü\u2019nde görev aldığınızı görüyorum. Bize anlatır mısınız?', cevap: 'Beykent\u2019te okurken İTÜ Dijital Pazarlama ve Sosyal Medya Öğrenci Kulübü\u2019nde Yönetim Kurulu Üyeliği üstlendim. Bu, İTÜ ekosistemine dışarıdan erken adaptasyonumun somut kanıtı — hem pazarlama tutkunun ne kadar eski olduğunu hem de İTÜ kültürüne olan ilgimi gösteriyor.', ipucu: '💡 Bu kozu "topluluk faaliyetleri" sorusunda mutlaka kullan.' },
    { tip: 'genel', soru: 'Beykent Üniversitesi\u2019nde hangi analitik dersleri aldınız? Doğrusal cebir, olasılık, yöneylem aldınız mı?', cevap: 'Evet. Endüstri Mühendisliği müfredatı kapsamında Olasılık ve İstatistik, Doğrusal Cebir, Yöneylem Araştırması I-II, Simülasyon, Üretim Planlaması ve Çizelgeleme derslerini aldım. Bunların hepsi İngilizce verildi. Tam burslu okumuş olmam bu derslerde sergilediğim akademik başarının da göstergesi.', ipucu: '💡 Jüri analitik altyapını test edecek. Hangi dersleri aldığını baştan hazırla.' }
  ],
  'itu-my': [
    { tip: 'teknik', soru: 'ROMI (Return on Marketing Investment) nasıl hesaplanır?', cevap: 'ROMI = (Pazarlama Kaynaklı Gelir - Pazarlama Maliyeti) / Pazarlama Maliyeti × 100. Doğru ölçüm için attribution modeling şart: last-click, first-click veya data-driven attribution. Hipodrom\u2019da CRM kampanyalarının ROI\u2019sini izlerken bu metrikleri canlı olarak takip ettim.', ipucu: '💡 Somut sayı vermekten çekinme. "Kampanyamızda %X ROI elde ettik" gibi örnekler güçlü.' },
    { tip: 'teknik', soru: 'Product-Market Fit\u2019i nasıl ölçersiniz?', cevap: 'Sean Ellis testini kullanabiliriz: "Bu ürün olmasa ne hissederdiniz?" sorusuna %40+ "Çok üzülürdüm" yanıtı PMF göstergesi. Ayrıca retention curve düzleşmesi, NPS skoru ve organic büyüme oranı kullanılabilir. Poca\u2019da müşteri iletişim süreçlerini Insider üzerinden takip ederken bu metrikleri doğrudan gözlemleme fırsatı buldum.', ipucu: '💡 Poca deneyimini bu soruyla bağla.' },
    { tip: 'teknik', soru: 'OKR (Objectives and Key Results) nedir? Bir pazarlama ekibinde nasıl uygulanır?', cevap: 'OKR: niteliksel hedef (Objective) ve onu ölçen sayısal sonuçlar (Key Results) çerçevesi. Örnek: O: "Dijital kanalda müşteri edinimini artır" / KR1: "Aylık yeni kullanıcı sayısını 10.000\u2019e çıkar" / KR2: "CAC\u2019ı %20 düşür" / KR3: "Email kampanya CTR\u2019ı %3\u2019e ulaştır". Poca\u2019da kampanya planlama ve finansal performans izleme süreçlerinde benzer bir çerçeve kullandım.', ipucu: '💡 Mühendislik yönetimi jürisi ölçülebilir hedef çerçevelerine bayılır.' },
    { tip: 'teknik', soru: 'Agile ürün yönetiminde Sprint Planning ve Backlog Grooming nasıl yapılır?', cevap: 'Sprint Planning: ekip kapasitesine göre backlog\u2019dan sprint\u2019e alınacak user story\u2019ler seçilir, story point ile büyüklük belirlenir. Backlog Grooming (Refinement): ürün backlog\u2019u düzenli gözden geçirilir, önceliklendirme güncellenir (MoSCoW: Must have / Should have / Could have / Won\u2019t have). Poca\u2019da ürün yönetimi asistanlığı sırasında bu süreçlere aktif katkı sağladım.', ipucu: '💡 "Agile çerçevesini teorik değil sahada öğrendim" mesajı güçlü.' },
    { tip: 'teknik', soru: 'CAC (Customer Acquisition Cost) ve LTV arasındaki ilişki neden kritiktir?', cevap: 'LTV/CAC oranı iş modelinin sürdürülebilirliğini gösterir. Kural: LTV ≥ 3×CAC. Eğer CAC yüksek ama LTV düşükse, büyüme ne kadar hızlı olursa olsun kârsızdır. Hipodrom\u2019da LTV maksimizasyonu ve Churn azaltımını birlikte yönetirken bu dengeyi tutturmak temel hedefimdi. Payback period (CAC\u2019ı ne zaman geri kazanırsın) da tamamlayıcı metriktir.', ipucu: '💡 Bu soruyu kesinlikle Hipodrom deneyimiyle bağla. Jüri pratiği sever.' },
    { tip: 'stres', soru: 'Bir Product Manager ile Mühendislik Yöneticisi arasındaki fark nedir? Siz hangisiniz?', cevap: 'PM, ürünün ne olması gerektiğine odaklanır (müşteri ihtiyacı, pazar analizi, önceliklendirme). Mühendislik Yöneticisi, ürünün nasıl yapılacağına odaklanır (teknik kapasite, süreç, ekip). Ben ikisi arasındaki köprüyü kuruyorum: Poca\u2019da PM rolü üstlenirken teknik altyapıyı (Insider) anlıyordum; Hipodrom\u2019da teknik veri altyapısını (B2Metric) kurarken iş etkisini (LTV, Churn) yönetiyordum.', ipucu: '💡 Bu soruyu doğrudan CV\u2019nden örneklerle yanıtla.' },
    { tip: 'stres', soru: 'Bir ürün başarısız olursa siz ne yapardınız? Poca\u2019da başarısız olduğunu düşündüğünüz bir karar var mıydı?', cevap: 'Başarısızlık öğrenmenin en hızlı yoludur; ama erken tespit şart. Poca\u2019da bir kampanya segmentasyonunun beklenen dönüşümü yakalamadığı oldu. İnceleyince segmentin fazla geniş tutulduğunu ve mesajın kişiselleştirilmediğini fark ettik. Insider\u2019ı daha granüler koşullarla yeniden yapılandırdık. Lesson learned: segment-mesaj uyumunu kurgulamadan kampanyayı başlatmamak.', ipucu: '💡 Başarısızlık sorusu güven sorusudur. "Hatadan öğrendim + düzelttim + sistematize ettim" üçlüsünü ver.' },
    { tip: 'motivasyon', soru: 'Mühendislik Yönetimi\u2019nde tez konunuz ne olabilir?', cevap: 'Büyük veri analitiği ve makine öğrenmesi yöntemlerini kullanarak, dijital platformlarda yeni ürün geliştirme süreçlerinin pazar odaklı optimizasyonu ve müşteri kabul modellerinin (TAM) simüle edilmesi.', ipucu: '💡 Tez önerisini somut tut: hangi sektör, hangi yöntem, hangi hocanın katkısı.' },
    { tip: 'motivasyon', soru: 'Mühendislik Yönetimi size İşletme Mühendisliği\u2019ne kıyasla ne kazandırır?', cevap: 'İşletme Mühendisliği pazarlama sistemi tasarımına odaklanırken, Mühendislik Yönetimi ürün-teknoloji-ticaret bütünleşmesini yönetmeyi öğretir. Hedefim yalnızca pazarlama değil, teknolojiyi ticarileştirme sürecinin tamamını akademik çerçevede incelemek. Tolga Kaya\u2019nın NPD araştırmaları tam bu kesiştir.', ipucu: '💡 Programı seçme gerekçeni sormak neredeyse kesin. Hazır ol.' },
    { tip: 'genel', soru: 'Bir şirkette pazarlama bütçesini nasıl optimize edersiniz?', cevap: 'Önce attribution modeli kur (hangi kanal ne kadar katkı sağlıyor). Sonra kanalları sabit bütçe kısıtı altında marjinal ROI\u2019ya göre sırala. Doğrusal programlama ile optimal dağılımı bul. Hipodrom\u2019da CRM kanalları (e-mail, push, SMS) arasında bu optimizasyonu pratikte yaptım.', ipucu: '💡 "Doğrusal programlama" ve "matematiksel optimizasyon" kelimelerini kullan — jüri bu dili sever.' },
    { tip: 'genel', soru: 'Ajans yönetimi deneyiminizden bize bir örnek verin. Ne öğrendiniz?', cevap: 'Poca\u2019da ajans koordinasyonunu yürüttüm: brief hazırlama, teslimat takvimi yönetimi, geri bildirim döngüleri ve performans metrikleri üzerinden değerlendirme. En büyük öğrenim: ajansın çıktısı kadar süreç kalitesi de kritik. Net KPI tanımı olmayan briefler her zaman yeniden çalışmaya dönüşür.', ipucu: '💡 Yönetim odaklı örnekler Müh. Yönetimi jürisini tatmin eder.' },
    { tip: 'stres', soru: 'Hem iş hem podcast hem akademi aynı anda sürdürülebilir mi?', cevap: 'Ben zaman yönetimini ve süreç optimizasyonunu projeler üzerinden kurgulayan bir endüstri mühendisiyim. Hayatımdaki bu alanlar birbirini engellemez, besler. Hipodrom\u2019daki kurumsal veri → akademik araştırma ham maddesi. Podcast → amfide ders anlatma pratiği. İkisi de akademisyen olma yolunda kritik avantajlar.', ipucu: '💡 Bu soruya hazırlıklı gel. Savunmacı tondan kaçın; sinerji çerçevesini kullan.' }
  ],
  'gsu-isletme': [

function showTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

══════════════════════════════════ */
let currentProg = 'gsu-isletme';

function showProg(progId, btn) {
  currentProg = progId;
  document.querySelectorAll('.prog-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProg();
}

function renderProg() {
  const p = PROGRAMLAR[currentProg];
  const content = document.getElementById('prog-content');

  const hocaCards = p.hocalar.map(h => `
    <div class="hoca-card">
      <div class="hoca-unvan">${h.unvan}</div>
      <div class="hoca-ad">${h.ad}</div>
      <div class="hoca-alan">${h.alan}</div>
      <div class="hoca-sinerji">✦ ${h.sinerji}</div>
      <div class="hoca-links">
        <a class="hoca-link" href="${h.scholar}" target="_blank" rel="noopener">Scholar ↗</a>
        <a class="hoca-link" href="${h.avesis}" target="_blank" rel="noopener">Avesis ↗</a>
      </div>
    </div>
  `).join('');

  const kozTags = p.kozlar.map(k => `<span class="koz-tag">${k}</span>`).join('');

  content.innerHTML = `
    <div class="section-title">${p.ad}</div>
    <div class="section-sub">Mülakat stratejisi ve hoca profilleri</div>

    <div class="strategy-card">
      <h3>⚖️ Jüri Profili</h3>
      <p>${p.juri}</p>
    </div>
    <div class="strategy-card">
      <h3>🎯 Temel Strateji</h3>
      <p>${p.strateji}</p>
    </div>
    <div class="strategy-card">
      <h3>🃏 Öne Çıkaracağın Kozlar</h3>
      <div class="koz-tags">${kozTags}</div>
    </div>

    <div class="cumle-box">
      <div class="cumle-label">⚡ Mülakat Kırılma Cümlesi</div>
      <p>"${p.cumle}"</p>
    </div>

    <div style="margin-top:24px; margin-bottom:12px; font-size:14px; font-weight:700; color:var(--text);">Çalışmak İstediğin Hocalar</div>
    <div class="hoca-grid">${hocaCards}</div>
  `;
}

        <div class="cevap-ipucu">${s.ipucu}</div>
      </div>
    </div>
  `).join('');

  main.innerHTML = `
    <div class="jury-bar">
      <div class="jury-dots">
        <div class="jury-dot active"></div>
        <div class="jury-dot"></div>
        <div class="jury-dot"></div>
      </div>
      <div class="jury-label">Jüri aktif — ${filtered.length} soru hazır</div>
      <div class="jury-prog">${progAd}</div>
    </div>
    ${filtered.length === 0
      ? '<div class="empty-state"><div class="empty-icon">🤔</div><div class="empty-text">Bu filtre için soru bulunamadı</div></div>'
      : soruHTML
    }
  `;
}

function toggleSoru(id) {
  document.getElementById(id).classList.toggle('open');
}

/* ══════════════════════════════════
   PANEL 3: BİLİMSEL
══════════════════════════════════ */
let currentKonu = 'istatistik';

function showKonu(konuId, btn) {
  currentKonu = konuId;
  document.querySelectorAll('.konu-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBilim();
}

function renderBilim() {
  const k = BILIMSEL_KONULAR[currentKonu];
  const main = document.getElementById('bilim-main');

  const diffLabel = { easy: '●', med: '●', hard: '●' };
  const diffTitle = { easy: 'Temel', med: 'Orta', hard: 'İleri' };

  const soruHTML = k.sorular.map((s, i) => `
    <div class="soru-bilim" id="bil-q-${i}" onclick="toggleBilim('bil-q-${i}')">
      <div class="soru-bilim-header">
        <div class="diff-dot diff-${s.zorluk}" title="${diffTitle[s.zorluk]}"></div>
        <div class="soru-bilim-text">${s.soru}</div>
        <div class="soru-bilim-toggle">▾</div>
      </div>
      <div class="soru-bilim-body">
        <div class="cevap-iskelet">${s.cevap}</div>
        <div>${s.kavramlar.map(kv => `<span class="kavram-tag">${kv}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');

  const total = k.sorular.length;
  main.innerHTML = `
    <div class="section-title">${k.baslik}</div>
    <div class="section-sub">${k.aciklama}</div>
    <div class="prog-bar-wrap">
      <div class="prog-bar-label">${total} soru · <span style="color:var(--green)">●</span> Temel &nbsp;<span style="color:#ff9f43">●</span> Orta &nbsp;<span style="color:var(--red)">●</span> İleri</div>
    </div>
    ${soruHTML}
  `;
}

function toggleBilim(id) {
  document.getElementById(id).classList.toggle('open');
}

/* ── INIT ── */
renderProg();
renderSim();
renderBilim();
</script>
</body>
</html>
